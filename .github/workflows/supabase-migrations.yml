name: Supabase migrations

# Migration PRs get validated against a disposable local database. Once merged
# to main, the same migration files are pushed to the linked Supabase project.
on:
  pull_request:
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
  workflow_dispatch:

concurrency:
  group: supabase-migrations-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate migrations
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1
      - name: Start local database
        run: supabase db start
      - name: Rebuild local database from migrations
        run: supabase db reset --local --no-seed
      - name: Lint local database
        run: supabase db lint --local

  deploy:
    name: Apply migrations to production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: supabase-production-migrations
      cancel-in-progress: false
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1
      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
      - name: Push pending migrations
        run: supabase db push --linked --password "$SUPABASE_DB_PASSWORD" --yes
