name: Supabase deploy

# Pull requests preview the migration delta against the linked project. Once
# merged to main, migrations are applied before the Edge Functions are deployed
# through the protected production environment.
on:
  pull_request:
    paths:
      - "supabase/migrations/**"
      - "supabase/functions/**"
      - "supabase/config.toml"
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/functions/**"
      - "supabase/config.toml"
  workflow_dispatch:

concurrency:
  group: supabase-deploy-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Preview migrations
    # Secrets are intentionally unavailable to forked PRs, so those previews
    # are skipped rather than failing or exposing production credentials.
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      # A project ref is non-sensitive, so accept the conventional repository
      # variable while remaining compatible with an existing secret.
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF || secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1
      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
      - name: Preview pending migrations
        run: supabase db push --linked --dry-run --password "$SUPABASE_DB_PASSWORD"

  deploy:
    name: Apply migrations and deploy functions
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: supabase-production-migrations
      cancel-in-progress: false
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF || secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run test suite before deployment
        run: npm test
      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1
      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
      - name: Push pending migrations
        run: supabase db push --linked --password "$SUPABASE_DB_PASSWORD" --yes
      - name: Deploy Edge Functions
        run: supabase functions deploy tailor extract-resume find-jobs --project-ref "$SUPABASE_PROJECT_REF" --use-api
