<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Career Coach - Dashboard</title>
<link rel="stylesheet" href="styles.css">
</head>
<body class="dashboard-body">
  <header class="topnav">
    <h1>Career Coach</h1>
    <nav class="tabs" aria-label="Dashboard views">
      <button class="tab active" type="button" data-tab="jobs">Jobs</button>
      <button class="tab" type="button" data-tab="discovery">Discovery</button>
      <button class="tab" type="button" data-tab="resume">Resume</button>
      <button class="tab" type="button" data-tab="settings">Settings</button>
    </nav>
    <div id="accountStatusNav" class="small account-status-nav"></div>
  </header>

  <main class="dashboard-shell">
    <section id="jobsView" class="view active">
      <div class="view-toolbar">
        <div class="toolbar-copy">
          <h2>Jobs</h2>
          <div id="jobsSummary" class="small"></div>
        </div>
        <div class="row jobs-filters">
          <label class="grow">Search
            <input id="filterSearch" type="search" placeholder="Title or company">
          </label>
          <label class="status-filter">Status
            <select id="filterStatus"></select>
          </label>
          <label class="status-filter">Queue
            <select id="filterRecommendation">
              <option value="all">All queues</option>
              <option value="apply_now">Apply Today</option>
              <option value="network_first">Network First</option>
              <option value="needs_review">Needs Review</option>
              <option value="skip">Skip / Archive</option>
            </select>
          </label>
          <label class="filter-checkbox">
            <input id="filterFollowUpDue" type="checkbox">
            Follow-up due
          </label>
        </div>
      </div>
      <div class="jobs-layout">
        <aside class="job-list-panel" aria-label="Saved jobs">
          <div id="jobList" class="job-list"></div>
        </aside>
        <section id="jobDetail" class="job-detail" aria-label="Job details"></section>
      </div>
    </section>

    <section id="discoveryView" class="view">
      <div class="view-toolbar"><div class="toolbar-copy"><h2>Discovery</h2><div class="small">Import roles you find; recommendations stay separate until you save one.</div></div></div>
      <div class="panel form-panel stack">
        <h3>Import a job to review</h3>
        <label>Job URL <input id="discoveryUrl" type="url" placeholder="https://company.example/jobs/123"></label>
        <label>Title <input id="discoveryTitle" placeholder="Product Manager"></label>
        <label>Company <input id="discoveryCompany" placeholder="Company"></label>
        <label>Location <input id="discoveryLocation" placeholder="Remote, Bengaluru, etc."></label>
        <label>Job description <textarea id="discoveryDescription" placeholder="Paste the job description"></textarea></label>
        <div class="form-actions"><button id="importDiscovery" class="primary" type="button">Add to Discovery</button><div id="discoveryStatus" class="status-line" aria-live="polite"></div></div>
      </div>
      <div id="discoveryList" class="stack"></div>
    </section>

    <section id="resumeView" class="view">
      <div class="view-toolbar">
        <div class="toolbar-copy">
          <h2>Resume</h2>
        </div>
      </div>
      <div class="panel form-panel stack">
        <label>Upload a PDF <span class="small">(extracts text — review before saving)</span>
          <input id="resumePdfInput" type="file" accept="application/pdf">
        </label>
        <div id="resumePdfStatus" class="status-line" aria-live="polite"></div>
        <label>Current resume <span class="small">(the most recently saved one is always what's used for tailoring)</span>
          <textarea id="resumeText" placeholder="Paste your resume text here, or upload a PDF above"></textarea>
        </label>
        <div id="resumeHealthStatus" class="stack compact"></div>
        <div class="form-actions">
          <button id="saveResume" class="primary" type="button">Save Resume</button>
          <div id="resumeStatus" class="status-line" aria-live="polite"></div>
        </div>
      </div>
    </section>

    <section id="settingsView" class="view">
      <div class="view-toolbar">
        <div class="toolbar-copy">
          <h2>Settings</h2>
        </div>
      </div>
      <div class="panel form-panel stack">
        <h3>Opportunity preferences</h3>
        <label>Target titles <span class="small">(comma-separated)</span>
          <input id="targetTitles" placeholder="Product Manager, Program Manager">
        </label>
        <label>Work preference
          <select id="remotePreference">
            <option value="">No preference</option>
            <option value="remote">Remote</option>
            <option value="hybrid">Hybrid</option>
            <option value="onsite">On-site</option>
            <option value="flexible">Flexible</option>
          </select>
        </label>
        <label>Work authorization <span class="small">(optional)</span>
          <input id="workAuthorization" placeholder="e.g. authorized to work in India">
        </label>
        <label>Salary floor <span class="small">(optional, annual)</span>
          <input id="salaryMin" type="number" min="0" placeholder="e.g. 100000">
        </label>
        <label>Excluded companies <span class="small">(comma-separated)</span>
          <input id="excludedCompanies" placeholder="Company names">
        </label>
        <div class="form-actions">
          <button id="savePreferences" class="primary" type="button">Save Preferences</button>
          <div id="preferencesStatus" class="status-line" aria-live="polite"></div>
        </div>
      </div>
      <div class="panel form-panel stack">
        <h3>Generation</h3>
        <label>Provider
          <select id="provider">
            <option value="anthropic">Anthropic</option>
            <option value="openai">OpenAI</option>
            <option value="gemini">Gemini</option>
          </select>
        </label>
        <label>Model
          <input id="model" placeholder="claude-opus-4-8">
        </label>
        <div class="form-actions">
          <button id="saveSettings" class="primary" type="button">Save Settings</button>
          <div id="settingsStatus" class="status-line" aria-live="polite"></div>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="dashboard.js"></script>
</body>
</html>
