<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Career Coach</title>
<link rel="stylesheet" href="styles.css">
</head>
<body class="popup-body">
  <div class="popup-shell">
    <header class="popup-header">
      <div>
        <h1>Career Coach</h1>
      </div>
    </header>

    <section id="accountSignedOut" class="panel account-card stack" aria-label="Account sign in">
      <div class="panel-header">
        <h2>Account</h2>
      </div>
      <label>Email
        <input id="authEmail" type="email" autocomplete="email" placeholder="you@example.com">
      </label>
      <label>Password
        <input id="authPassword" type="password" autocomplete="current-password" placeholder="Password">
      </label>
      <button id="signIn" class="primary full-width" type="button">Log in</button>
      <button id="forgotPassword" class="subtle full-width" type="button">Forgot password?</button>
      <p class="small">Invite-only right now — ask the maintainer for access.</p>
    </section>

    <section id="accountSignedIn" class="panel account-summary" style="display:none" aria-label="Signed in account">
      <div id="accountInitial" class="account-dot" aria-hidden="true"></div>
      <div class="grow">
        <div class="small">Signed in</div>
        <div id="accountEmail" class="mini-job-title"></div>
      </div>
      <button id="signOut" class="subtle" type="button">Log out</button>
    </section>
    <div id="accountStatus" class="status-line" aria-live="polite"></div>

    <section id="signedInActions" class="stack" style="display:none">
      <div class="panel capture-panel stack">
        <button id="captureJob" class="primary full-width" type="button">
          Save current tab
        </button>
        <div id="captureStatus" class="status-line" aria-live="polite"></div>
      </div>

      <div class="stack compact">
        <div class="panel-header">
          <h2>Recent Jobs</h2>
        </div>
        <div id="recentJobs" class="recent-list stack compact"></div>
      </div>

      <button id="openDashboard" class="full-width" type="button">
        Open Dashboard
      </button>
    </section>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
